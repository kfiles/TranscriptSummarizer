steps:
  # Create hugo content dir
  - name: 'busybox'
    id: mk-contentdir
    args: ['mkdir', '-p', 'site/content/minutes']

  # Pull new markdown files written by the Cloud Function from GCS into the repo's
  # Hugo content directory. Existing files are preserved; only new/updated ones are added.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: sync-content
    entrypoint: gsutil
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - 'gs://$_CONTENT_BUCKET/minutes/'
      - 'site/content/minutes/'

  # Build the Hugo site.
  - name: 'klakegg/hugo:0.111.3-ext-alpine'
    id: hugo-build
    args:
      - '--source=site'
      - '--minify'
    waitFor:
      - sync-content

  # Deploy only the hosting portion to Firebase (no functions or rules).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: firebase-deploy
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools &&
        firebase deploy --only hosting \
          --project $_FIREBASE_PROJECT \
          --token "$$FIREBASE_TOKEN" \
          --non-interactive
    secretEnv:
      - FIREBASE_TOKEN
    waitFor:
      - hugo-build

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/mongodb-uri/versions/latest
      env: MONGODB_URI

# Substitution defaults — override these in the Cloud Build trigger UI or --substitutions flag.
substitutions:
  _CONTENT_BUCKET: $PROJECT_ID-hugo-content
  _FIREBASE_PROJECT: miltonmeetingsummarizer

options:
  logging: CLOUD_LOGGING_ONLY
